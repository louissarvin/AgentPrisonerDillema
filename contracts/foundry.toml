[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = true
via_ir = false

[rpc_endpoints]
0g_testnet = "https://evmrpc-testnet.0g.ai"
0g_mainnet = "https://evmrpc.0g.ai"
unichain_sepolia = "https://sepolia.unichain.org"

[etherscan]
0g_testnet = { key = "PLACEHOLDER", url = "https://chainscan-galileo.0g.ai/open/api", chain = 16602 }
0g_mainnet = { key = "PLACEHOLDER", url = "https://chainscan.0g.ai/open/api", chain = 16661 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
